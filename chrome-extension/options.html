<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MeTube Einstellungen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4f46e5;
    }

    .hint {
      font-size: 12px;
      color: #4b5563;
      margin-top: 5px;
    }

    .btn {
      padding: 10px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #4338ca; }

    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      background: #052e16;
      color: #4ade80;
      border: 1px solid #166534;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MeTube Einstellungen</h1>
    <p class="subtitle">Konfiguriere deine lokale MeTube-Instanz</p>

    <div class="field">
      <label for="metubeUrl">MeTube URL</label>
      <input type="text" id="metubeUrl" placeholder="http://localhost:8081" />
      <p class="hint">Standard: http://localhost:8081 — bei HTTPS-Proxy entsprechend anpassen.</p>
    </div>

    <button class="btn" id="saveBtn">Speichern</button>
    <div class="status" id="status">Einstellungen gespeichert.</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
