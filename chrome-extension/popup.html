<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeTube Downloader</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    .header {
      background: #1a1a2e;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a2a4a;
    }

    .header svg {
      width: 28px;
      height: 28px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }

    .header a {
      margin-left: auto;
      color: #6b7280;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .header a:hover {
      color: #9ca3af;
    }

    .content {
      padding: 16px;
    }

    .url-field {
      width: 100%;
      padding: 8px 10px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 12px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-field:focus {
      border-color: #4f46e5;
    }

    .toggle-group {
      display: flex;
      background: #1e1e1e;
      border-radius: 6px;
      padding: 3px;
      margin-bottom: 12px;
      border: 1px solid #333;
    }

    .toggle-btn {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #9ca3af;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      background: #4f46e5;
      color: #fff;
    }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
      margin-bottom: 8px;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-primary:disabled {
      background: #374151;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #1e1e1e;
      color: #e8e8e8;
      border: 1px solid #333;
    }

    .btn-secondary:hover {
      background: #2a2a2a;
    }

    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 12px 0;
    }

    .transcript-section {
      display: none;
    }

    .transcript-section.visible {
      display: block;
    }

    .transcript-label {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    .status.success {
      background: #052e16;
      color: #4ade80;
      border: 1px solid #166534;
      display: block;
    }

    .status.error {
      background: #2d0a0a;
      color: #f87171;
      border: 1px solid #7f1d1d;
      display: block;
    }

    .status.info {
      background: #1e1b4b;
      color: #818cf8;
      border: 1px solid #3730a3;
      display: block;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <h1>MeTube</h1>
    <a id="optionsLink">Einstellungen</a>
  </div>

  <div class="content">
    <input type="text" class="url-field" id="urlInput" placeholder="https://youtube.com/watch?v=..." />

    <div class="toggle-group">
      <button class="toggle-btn active" id="btnVideo" data-type="video">Video</button>
      <button class="toggle-btn" id="btnAudio" data-type="audio">Audio</button>
    </div>

    <button class="btn btn-primary" id="downloadBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Herunterladen
    </button>

    <hr class="divider" id="transcriptDivider" style="display:none;">

    <div class="transcript-section" id="transcriptSection">
      <div class="transcript-label">YouTube Transcript</div>
      <button class="btn btn-secondary" id="transcriptBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Transcript kopieren
      </button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
